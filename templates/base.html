<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>{% block title %}permit-system{% endblock %}</title>
    <style>
        body { font-family: sans-serif; margin: 2rem; }
        table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
        th, td { border: 1px solid #ccc; padding: 0.4rem; text-align: left; vertical-align: top; }
        th { background: #f4f4f4; }
        .actions form { display: inline-block; margin: 0 0.4rem 0.4rem 0; }
        .messages { padding: 0; }
        .messages li { list-style: none; margin: 0.4rem 0; padding: 0.5rem; background: #f4f4f4; }
        .error { color: #a40000; }
        label { display: block; margin-top: 0.75rem; font-weight: bold; }
        input, select, textarea { min-width: 20rem; max-width: 100%; }
        .status-badge {
            border-radius: 999px;
            display: inline-block;
            font-size: 0.85rem;
            font-weight: bold;
            padding: 0.2rem 0.55rem;
            white-space: nowrap;
        }
        .status-draft { background: #eef2ff; color: #3730a3; }
        .status-submitted { background: #fef3c7; color: #92400e; }
        .status-returned { background: #ffedd5; color: #9a3412; }
        .status-approved-by-master { background: #dbeafe; color: #1d4ed8; }
        .status-approved-by-chief { background: #dcfce7; color: #166534; }
        .status-rejected { background: #fee2e2; color: #991b1b; }
        .status-closed { background: #e5e7eb; color: #374151; }
        .status-archived { background: #f3f4f6; color: #4b5563; }
        .status-unknown { background: #f5f5f5; color: #444; }
    </style>
</head>
<body>
<header>
    <h1><a href="{% url 'permits:dashboard' %}">permit-system</a></h1>
    <nav>
        <a href="{% url 'permits:dashboard' %}">Панель управления</a>
        <a href="{% url 'permits:list' %}">Наряды</a>
        <a href="{% url 'permits:create' %}">Создать наряд</a>
        <a href="{% url 'faq' %}">FAQ</a>
    </nav>
</header>
{% if messages %}
<ul class="messages">
    {% for message in messages %}<li class="{{ message.tags }}">{{ message }}</li>{% endfor %}
</ul>
{% endif %}
<main>
    {% block content %}{% endblock %}
</main>
</body>
</html>
