<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{% block title %}permit-system{% endblock %}</title>
    <style>
        body { font-family: sans-serif; margin: 2rem; }
        table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
        th, td { border: 1px solid #ccc; padding: 0.4rem; text-align: left; vertical-align: top; }
        th { background: #f4f4f4; }
        .actions form { display: inline-block; margin: 0 0.4rem 0.4rem 0; }
        .messages { padding: 0; }
        .messages li { list-style: none; margin: 0.4rem 0; padding: 0.5rem; background: #f4f4f4; }
        .error { color: #a40000; }
        label { display: block; margin-top: 0.75rem; font-weight: bold; }
        input, select, textarea { min-width: 20rem; max-width: 100%; }
    </style>
</head>
<body>
<header>
    <h1><a href="{% url 'permits:list' %}">permit-system</a></h1>
    <nav><a href="{% url 'permits:create' %}">Create permit</a></nav>
</header>
{% if messages %}
<ul class="messages">
    {% for message in messages %}<li class="{{ message.tags }}">{{ message }}</li>{% endfor %}
</ul>
{% endif %}
<main>
    {% block content %}{% endblock %}
</main>
</body>
</html>
