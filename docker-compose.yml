services:
  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: "dev-insecure-permit-system-secret-key"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      POSTGRES_DB: permit_system
      POSTGRES_USER: permit_system
      POSTGRES_PASSWORD: permit_system
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: permit_system
      POSTGRES_USER: permit_system
      POSTGRES_PASSWORD: permit_system
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U permit_system -d permit_system"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
