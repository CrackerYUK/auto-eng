services:
  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn permit_system.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "${DJANGO_DEBUG:-0}"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-dev-insecure-permit-system-secret-key}"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}"
      DATABASE_URL: "${DATABASE_URL:-postgresql://permit_system:permit_system@db:5432/permit_system}"
      STATIC_ROOT: "${STATIC_ROOT:-/app/staticfiles}"
      MEDIA_ROOT: "${MEDIA_ROOT:-/app/media}"
      PDF_CONVERTER_ENABLED: "${PDF_CONVERTER_ENABLED:-0}"
      SOFFICE_PATH: "${SOFFICE_PATH:-soffice}"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-permit_system}"
      POSTGRES_USER: "${POSTGRES_USER:-permit_system}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-permit_system}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U permit_system -d permit_system"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  media_files:
  static_files:
